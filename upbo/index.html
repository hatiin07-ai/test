<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>냔냐 — 업보책 💙</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          bg:'#F6F8FF', card:'#FFFFFF', point:'#AFC8FF', accent:'#6E8BFF',
          txt:'#2F3A5F', sub:'#7C86A5', thead:'#E4EDFF',
          event:'#6E8BFF', eventBg:'#EEF3FF', eventBorder:'#D6E2FF'
        },
        fontFamily: { sans:['A2z','sans-serif'], poppins:['A2z','sans-serif'] }
      }}
    }
  </script>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    @font-face { font-family:'A2z'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-1Thin.woff2') format('woff2'); font-weight:100; font-display:swap; }
    @font-face { font-family:'A2z'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-2ExtraLight.woff2') format('woff2'); font-weight:200; font-display:swap; }
    @font-face { font-family:'A2z'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-3Light.woff2') format('woff2'); font-weight:300; font-display:swap; }
    @font-face { font-family:'A2z'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-4Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
    @font-face { font-family:'A2z'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-5Medium.woff2') format('woff2'); font-weight:500; font-display:swap; }
    @font-face { font-family:'A2z'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-6SemiBold.woff2') format('woff2'); font-weight:600; font-display:swap; }
    @font-face { font-family:'A2z'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-7Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }
    @font-face { font-family:'A2z'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-8ExtraBold.woff2') format('woff2'); font-weight:800; font-display:swap; }
    @font-face { font-family:'A2z'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-9Black.woff2') format('woff2'); font-weight:900; font-display:swap; }

    .nav-tab { position:relative; padding:12px 24px; font-size:.875rem; font-weight:500; color:#7C86A5; transition:color .25s; text-decoration:none; }
    .nav-tab::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:2px; background:#6E8BFF; border-radius:1px; transition:width .3s; }
    .nav-tab:hover { color:#6E8BFF; } .nav-tab:hover::after { width:60%; }
    .nav-tab.active { color:#6E8BFF; } .nav-tab.active::after { width:100%; }
  </style>
</head>
<body class="bg-bg min-h-screen font-sans">

  <!-- Nav -->
  <nav class="sticky top-0 z-50 bg-bg/95 backdrop-blur-sm border-b border-point/20">
    <div class="max-w-5xl mx-auto flex items-center justify-center">
      <a href="/" class="nav-tab">프로필</a>
      <a href="/schedule/" class="nav-tab">일정</a>
      <a href="/upbo/" class="nav-tab active">업보책</a>
      <a href="https://www.songstudio.live/songbook/platform/@%EB%83%94%EB%83%90_" target="_blank" rel="noopener" class="nav-tab">노래책</a>
      <a href="https://weflab.com/user/lOPU2sualmZsZw" target="_blank" rel="noopener" class="nav-tab">룰렛확률</a>
    </div>
  </nav>

  <!-- Header Banner -->
  <header class="pt-8 pb-2">
    <div class="max-w-5xl mx-auto px-4">
      <div class="relative overflow-hidden rounded-2xl" style="aspect-ratio: 2320/338;">
        <img src="../assets/images/banner.png" alt="냔냐 업보책"
          class="w-full h-full object-cover"
          onerror="this.parentElement.style.background='linear-gradient(135deg, #EEF3FF 0%, #D6E2FF 50%, #AFC8FF 100%)';">

      </div>
    </div>
  </header>

  <!-- 시즌 탭 -->
  <div class="max-w-5xl mx-auto px-4 mt-5 mb-4">
    <div id="seasonTabWrap"></div>
  </div>

  <!-- Search | 갱신일 | 문의 — 한 줄 -->
  <div class="max-w-5xl mx-auto px-4 mt-6 mb-2 relative flex items-center">
    <!-- 좌: 검색 -->
    <input type="text" id="searchInput" placeholder="🔍 닉네임 또는 아이디 검색"
      class="w-48 md:w-64 px-4 py-2.5 rounded-xl border border-point/30 bg-white
      focus:outline-none focus:ring-2 focus:ring-accent/30 text-sm text-txt
      placeholder:text-sub/60">

    <!-- 가운데: 갱신일 — 절대 가운데 고정 -->
    <div class="absolute left-1/2 -translate-x-1/2">
      <div class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white border border-point/20">
        <span class="text-xs text-sub">🗓</span>
        <span id="lastUpdated" class="text-xs font-semibold text-sub tracking-wide">불러오는 중...</span>
      </div>
    </div>

    <!-- 우: 문의 버튼 -->
    <button onclick="openInquiryModal()"
      class="ml-auto shrink-0 px-4 py-2.5 rounded-xl bg-accent text-white text-sm font-semibold
      hover:bg-accent/90 transition-colors">
      ✉️ 문의
    </button>
  </div>
  <div class="max-w-5xl mx-auto px-4 mb-4">
    <p id="memberCount" class="text-sub text-xs hidden"></p>
  </div>

  <!-- Main -->
  <main class="max-w-5xl mx-auto px-4 pb-16">

    <div id="memberList" class="space-y-3"></div>

    <div id="emptyState" class="hidden text-center py-16">
      <p class="text-sub text-lg">📋 등록된 숙제가 없습니다</p>
    </div>

    <div id="loadingState" class="text-center py-16">
      <div class="inline-block w-8 h-8 border-3 border-point border-t-transparent rounded-full animate-spin"></div>
      <p class="text-sub mt-3 text-sm">숙제 목록을 불러오는 중...</p>
    </div>

  </main>

  <!-- 문의 모달 -->
  <div id="inquiryModal" class="hidden fixed inset-0 bg-black/30 z-50 flex items-start justify-center px-4" style="padding-top: 120px;">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm border border-point/20">
      <h3 class="font-semibold text-txt text-lg mb-1">✉️ 문의하기</h3>
      <p class="text-sub text-xs mb-4">누락이나 변경 사항을 적어주세요</p>
      <form id="inquiryForm" class="space-y-3">
        <div>
          <label class="block text-sm text-txt mb-1">닉네임</label>
          <input type="text" id="inquiryNickname" required placeholder="닉네임 입력"
            class="w-full px-4 py-2 rounded-xl border border-point/30 bg-bg
            focus:outline-none focus:ring-2 focus:ring-accent/30 text-sm">
        </div>
        <div>
          <label class="block text-sm text-txt mb-1">내용</label>
          <textarea id="inquiryContent" required rows="3" placeholder="예: OO 숙제 누락 / 수량 변경"
            class="w-full px-4 py-2 rounded-xl border border-point/30 bg-bg
            focus:outline-none focus:ring-2 focus:ring-accent/30 text-sm resize-none"></textarea>
        </div>
        <div class="flex gap-2 pt-1">
          <button type="submit"
            class="flex-1 py-2 rounded-xl bg-accent text-white text-sm font-semibold
            hover:bg-accent/90 transition-colors">보내기</button>
          <button type="button" onclick="closeInquiryModal()"
            class="flex-1 py-2 rounded-xl border border-sub/30 text-sub text-sm
            hover:bg-gray-50 transition-colors">취소</button>
        </div>
      </form>
      <p id="inquirySuccess" class="hidden text-accent text-sm text-center mt-3 font-semibold">✅ 문의가 접수되었습니다!</p>
    </div>
  </div>

  <footer class="text-center py-6 text-sub text-xs">
    <p>© 2026 냔냐 💙</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/upbo.js"></script>
</body>
</html>
